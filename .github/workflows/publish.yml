name: Publish to npm

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag is on main branch
        run: |
          git fetch origin main --depth=50
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "Error: tag '$GITHUB_REF_NAME' is not reachable from origin/main"
            exit 1
          fi
          echo "Branch check passed: tag is on main"

      - name: Validate tag matches package.json version
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: tag '$TAG_VERSION' does not match package.json version '$PKG_VERSION'"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH }}
